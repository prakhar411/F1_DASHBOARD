spring:
  application:
    name: backend
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-secret-change-in-production-must-be-at-least-32-bytes-long}
    expiration-ms: 604800000
  brevo:
    api-key: ${BREVO_API_KEY:}
    from-email: ${BREVO_FROM_EMAIL:prakharr.492@gmail.com}
    from-name: ${BREVO_FROM_NAME:PitWall}
