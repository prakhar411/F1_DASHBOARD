<nav class="navbar navbar-expand-lg pw-navbar">
  <div class="container">
    <a class="navbar-brand pw-brand" [routerLink]="(currentUserName$ | async) ? '/dashboard' : '/'">

      <span class="brand-pit">Pit</span><span class="brand-wall">Wall</span>
    </a>
    <button class="navbar-toggler pw-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto gap-lg-2">
        <li class="nav-item">
          <a class="nav-link pw-link" routerLink="/standings" routerLinkActive="active">Standings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link pw-link" routerLink="/drivers" routerLinkActive="active">Drivers</a>
        </li>
        <li class="nav-item">
          <a class="nav-link pw-link" routerLink="/teams" routerLinkActive="active">Teams</a>
        </li>
        <li class="nav-item">
          <a class="nav-link pw-link" routerLink="/calendar" routerLinkActive="active">Calendar</a>
        </li>
      </ul>

        <ng-container *ngIf="currentUserName$ | async as name; else loggedOut">
          <li class="nav-item">
            <a class="nav-link pw-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
          </li>
          <li class="nav-item dropdown" ngbDropdown>
            <a class="nav-link pw-link pw-user-toggle" ngbDropdownToggle role="button">{{ name }}</a>

              <button type="button" ngbDropdownItem (click)="logout()">Logout</button>
