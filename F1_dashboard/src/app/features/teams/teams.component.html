<h1 class="mb-4">Teams</h1>

<div *ngIf="loading" class="text-muted">Loading teams&hellip;</div>

<div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
  <div class="col" *ngFor="let t of teams">
    <div class="card h-100 team-accent" [style.border-left-color]="teamColor(t.constructorId)">
      <div class="card-body d-flex align-items-center gap-3">
        <app-team-badge [constructorId]="t.constructorId" [name]="t.name" [size]="48"></app-team-badge>
        <div>
          <h5 class="card-title mb-0">{{ t.name | teamName:t.constructorId }}</h5>
          <p class="card-text text-muted mb-0" *ngIf="t.nationality">{{ t.nationality }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
