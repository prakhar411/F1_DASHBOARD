<h1 class="mb-4">Calendar</h1>

<div *ngIf="loading" class="text-muted">Loading calendar&hellip;</div>

<div class="list-group">
  <div class="list-group-item d-flex justify-content-between align-items-center"
       *ngFor="let r of races"
       [class.next-race-row]="r.round === nextRound">
    <div>
      <div class="fw-bold">Round {{ r.round }} &mdash; {{ r.raceName }}</div>
      <div class="text-muted small">{{ r.circuitName }}, {{ r.locality }}, {{ r.country }}</div>
    </div>
    <div class="text-end">
      <div>{{ r.raceDate | date:'mediumDate' }}</div>
      <span class="badge bg-danger" *ngIf="r.round === nextRound">Next race</span>
    </div>
  </div>
</div>
