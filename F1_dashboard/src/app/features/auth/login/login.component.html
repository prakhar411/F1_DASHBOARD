<div class="auth-stage">
  <div class="auth-card">

    <div class="auth-header">
      <span class="auth-stripe" aria-hidden="true"></span>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to your PitWall account.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="form-field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="text" inputmode="email" class="form-control" formControlName="email"
               autocomplete="email" placeholder="you@example.com"
               [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
        <div class="field-error" role="alert" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          <span *ngIf="form.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="form.get('email')?.errors?.['pattern']">Enter a valid email address.</span>
        </div>
      </div>

      <div class="form-field">
        <label for="loginPassword">Password</label>
        <div class="password-field">
          <input [type]="showPassword ? 'text' : 'password'" id="loginPassword" class="form-control"
                 formControlName="password" autocomplete="current-password" placeholder="Your password"
                 [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
          <button type="button" class="password-toggle" (click)="togglePassword()"
                  [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M12 5c-5.5 0-9.5 4.5-10.5 7 1 2.5 5 7 10.5 7s9.5-4.5 10.5-7c-1-2.5-5-7-10.5-7zm0 11.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9zm0-2a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M2.7 2.7 1.3 4.1l3.3 3.3C3 8.9 1.6 10.8 1 12c1 2.5 5 7 11 7 2 0 3.8-.5 5.3-1.3l3.4 3.4 1.4-1.4L2.7 2.7zM12 16.5a4.5 4.5 0 0 1-4.5-4.5c0-.8.2-1.5.6-2.1l1.5 1.5a2.5 2.5 0 0 0 3 3l1.5 1.5c-.6.4-1.3.6-2.1.6zm.4-8.98L15 10.1a4.5 4.5 0 0 0-3-3l.4-.58zM12 5c5.5 0 9.5 4.5 10.5 7-.4 1-1.3 2.3-2.5 3.5l-1.4-1.4c1-.9 1.7-1.9 2.1-2.6-1-1.9-4-5.5-8.7-5.5-.9 0-1.8.1-2.6.4L7.9 4.9C9.2 4.5 10.6 5 12 5z"/>
            </svg>
          </button>
        </div>
        <div class="field-error" role="alert" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          <span *ngIf="form.get('password')?.errors?.['required']">Password is required.</span>
        </div>
      </div>

      <div class="auth-banner" role="alert" *ngIf="loginFailed">
        Invalid email or password.
      </div>

      <button type="submit" class="auth-submit" [disabled]="submitting">
        <span *ngIf="!submitting">Log In</span>
        <span *ngIf="submitting" class="submit-loading">
          <span class="spinner-border spinner-border-sm" role="status"></span>
          Logging in&hellip;
        </span>
      </button>
    </form>

    <p class="auth-switch">New to PitWall? <a routerLink="/signup">Create an account</a></p>
  </div>
</div>
